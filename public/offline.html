<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <title>Hisab is offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7fbf8;
        color: #10201d;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(88vw, 420px);
        padding: 24px;
        border: 1px solid #d8e7e2;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 18px 50px rgba(16, 32, 29, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
      }
      p {
        margin: 0;
        color: #52655f;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hisab is offline</h1>
      <p>Your saved data is still available inside the app. Reopen Hisab once the first app shell has been cached.</p>
    </main>
  </body>
</html>
